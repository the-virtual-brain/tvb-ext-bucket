name: Build

on:
  push:
    branches:
    - '*'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.8", "3.9", "3.10" ]

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Base Setup
      uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1

    - name: Install dependencies
      run: |
        python -m pip install -U jupyterlab~=3.1 ebrains-drive pytest pytest-mock pytest_tornasync pytest-cov

    - name: Build and package the extension
      env:
        CLB_AUTH: 'TEST_TOKEN'
      run: |
        set -eux
        jlpm
        jlpm run lint:check
        python -m pip install .
        jupyter server extension list
        jupyter server extension list 2>&1 | grep -ie "tvbextbucket.*OK"
        jupyter labextension list
        jupyter labextension list 2>&1 | grep -ie "tvb-ext-bucket.*OK"
        python -m jupyterlab.browser_check
        check-manifest -v
        
        pip install build
        python -m build --sdist
        pip uninstall -y "tvb-ext-bucket" jupyterlab

    - name: Test the extension
      run: |
        set -eux
        jlpm run test
        pytest tvbextbucket -r ap

    - name: Compute coverage
      run: |
        pytest -v  --cov --cov-report=xml

    - name: Upload extension packages
      uses: actions/upload-artifact@v2
      with:
        name: extension-artifacts
        path: dist/tvbextbucket*
        if-no-files-found: error

  test_isolated:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Install Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
        architecture: 'x64'
    - uses: actions/download-artifact@v2
      with:
        name: extension-artifacts
    - name: Install and Test
      run: |
        set -eux
        # Remove NodeJS, twice to take care of system and locally installed node versions.
        sudo rm -rf $(which node)
        sudo rm -rf $(which node)
        
        pip install "jupyterlab~=3.1" dist/tvbextbucket*.tar.gz

        jupyter server extension list 2>&1 | grep -ie "tvbextbucket.*OK"
        jupyter labextension list 2>&1 | grep -ie "tvb-ext-bucket.*OK"
        python -m jupyterlab.browser_check --no-chrome-test
